name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run type check
      run: npm run typecheck

    - name: Run linting
      run: npm run lint:check

    - name: Run unit tests
      run: npm test

    - name: Build application
      run: npm run build

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build and package Windows installer
      run: npm run dist:win
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Windows installer
      uses: actions/upload-artifact@v4
      with:
        name: FindMyKid-Windows-Setup
        path: |
          dist-electron/*.exe
          dist-electron/*.exe.blockmap
        retention-days: 90

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, build-windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Windows installer
      uses: actions/download-artifact@v4
      with:
        name: FindMyKid-Windows-Setup
        path: release-assets

    - name: Get version from package.json
      id: pkg
      run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.pkg.outputs.version }}
        name: "大海撈Ｂ v${{ steps.pkg.outputs.version }}"
        draft: false
        prerelease: false
        generate_release_notes: true
        files: release-assets/*
        body: |
          ## 下載安裝

          1. 下載下方的 `.exe` 檔案
          2. 執行安裝程式，如遇到 Windows SmartScreen 警告，請點選「更多資訊」→「仍要執行」
          3. 安裝完成後從桌面捷徑啟動

          ## 功能說明

          用 AI 臉部辨識，從大量照片中自動找出指定小孩的照片。
          完全離線運作，照片不會上傳到任何伺服器。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
